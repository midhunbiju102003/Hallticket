<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hall Ticket System{% endblock %}</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .premium-card {
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.07), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-premium {
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-premium:active {
            transform: scale(0.96);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="min-h-screen">
    <nav class="glass-nav py-3">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-12">
                <div class="flex items-center space-x-3 group cursor-pointer" onclick="window.location.href='/admin/dashboard'">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200 group-hover:scale-110 transition-transform duration-300">
                        <i class="fas fa-graduation-cap text-white"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-lg font-black bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700 tracking-tight leading-none">CampusEntry</span>
                        <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest mt-1">Smart Logistics</span>
                    </div>
                </div>
                <div class="flex items-center space-x-8">
                    <div id="user-info" class="hidden md:flex items-center">
                        <!-- Populated by JS -->
                    </div>
                    <button onclick="logout()" class="group flex items-center space-x-2 px-4 py-2 bg-slate-50 hover:bg-red-50 text-slate-500 hover:text-red-600 rounded-xl text-xs font-bold transition-all">
                        <i class="fas fa-power-off text-[10px] group-hover:rotate-90 transition-transform duration-500"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Hidden div for Tailwind class extraction -->
    <div class="hidden bg-green-500 bg-red-500 bg-yellow-500"></div>

    <script>
        const API_URL = '/api';
        
        function getToken() {
            return localStorage.getItem('token');
        }
        
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${getToken()}`
            };
        }
        
        function showNotification(title, message = '', type = 'success') {
            const id = 'notif-' + Date.now();
            const iconMapping = {
                'success': 'fa-check-circle text-green-500',
                'error': 'fa-exclamation-circle text-red-500',
                'warning': 'fa-info-circle text-orange-500'
            };
            const borderMapping = {
                'success': 'border-green-500',
                'error': 'border-red-500',
                'warning': 'border-orange-500'
            };

            const html = `
                <div id="${id}" class="fixed top-6 right-6 bg-white rounded-2xl shadow-2xl p-5 max-w-sm z-[10000] border-l-4 ${borderMapping[type] || 'border-indigo-500'} animate-in slide-in-from-right duration-300 transform">
                    <div class="flex items-start gap-4">
                        <i class="fas ${iconMapping[type] || 'fa-info-circle'} text-2xl mt-0.5"></i>
                        <div class="flex-1 pr-4">
                            <p class="font-black text-slate-900 text-sm tracking-tight">${title}</p>
                            <p class="text-xs text-slate-500 mt-1 leading-relaxed">${message}</p>
                        </div>
                        <button onclick="this.parentElement.parentElement.remove()" class="text-slate-300 hover:text-slate-500 transition-colors">
                            <i class="fas fa-times text-xs"></i>
                        </button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', html);
            setTimeout(() => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.add('fade-out');
                    setTimeout(() => el.remove(), 300);
                }
            }, 5000);
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }
        
        function displayUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const userInfo = document.getElementById('user-info');
            if (user.username) {
                userInfo.innerHTML = `<span>${user.username} (${user.role})</span>`;
            }
        }
        
        document.addEventListener('DOMContentLoaded', displayUserInfo);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
